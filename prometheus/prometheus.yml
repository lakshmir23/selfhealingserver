global:
  scrape_interval: 5s

scrape_configs:
  - job_name: "selfhealing"
    static_configs:
      - targets: ["host.docker.internal:8000"]

  - job_name: "metrics_exporter"
    static_configs:
      - targets: ["metrics:8000"]

  - job_name: "cadvisor"
    static_configs:
      - targets: ["cadvisor:8080"]

